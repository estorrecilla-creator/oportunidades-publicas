<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oportunidades Públicas - Subvenciones & Licitaciones</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    
    .container {
      max-width: 500px;
      width: 90%;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      display: none;
    }
    
    .card.active {
      display: block;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 28px;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .header p {
      color: #666;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }
    
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .toggle-text {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    
    .toggle-text button {
      background: none;
      color: #667eea;
      padding: 0;
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
      border: none;
      box-shadow: none;
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #c33;
    }
    
    .dashboard {
      display: none;
    }
    
    .dashboard.active {
      display: block;
    }
    
    .user-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    
    .logout-btn {
      background: #e74c3c !important;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card active" id="loginCard">
      <div class="header">
        <h1>🔐 Iniciar Sesión</h1>
        <p>Accede a Oportunidades Públicas</p>
      </div>
      
      <div id="loginError" class="error" style="display: none;"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="tu@email.com">
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        
        <button type="submit">Iniciar Sesión</button>
      </form>
      
      <div class="toggle-text">
        ¿No tienes cuenta? <button onclick="toggleCard('registerCard', 'loginCard')">Registrate aquí</button>
      </div>
    </div>
    
    <div class="card" id="registerCard">
      <div class="header">
        <h1>📝 Crear Cuenta</h1>
        <p>Únete a Oportunidades Públicas</p>
      </div>
      
      <div id="registerError" class="error" style="display: none;"></div>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" required placeholder="tu@email.com">
        </div>
        
        <div class="form-group">
          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" required placeholder="••••••••">
        </div>
        
        <div class="form-group">
          <label for="firstName">Nombre</label>
          <input type="text" id="firstName" placeholder="Tu nombre">
        </div>
        
        <div class="form-group">
          <label for="lastName">Apellido</label>
          <input type="text" id="lastName" placeholder="Tu apellido">
        </div>
        
        <div class="form-group">
          <label for="companyName">Empresa (opcional)</label>
          <input type="text" id="companyName" placeholder="Tu empresa">
        </div>
        
        <button type="submit">Crear Cuenta</button>
      </form>
      
      <div class="toggle-text">
        ¿Ya tienes cuenta? <button onclick="toggleCard('loginCard', 'registerCard')">Inicia sesión aquí</button>
      </div>
    </div>
    
    <div class="card dashboard" id="dashboard">
      <div class="user-header">
        <h2>👤 Bienvenido, <span id="userName">Usuario</span></h2>
        <p id="userEmail">email@example.com</p>
      </div>
      
      <p style="margin-bottom: 20px;">Dashboard - Próximas funcionalidades en desarrollo</p>
      
      <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>
  </div>
  
  <script>
    const API_URL = 'https://oportunidades-publicas-production.up.railway.app';
    
    function toggleCard(showId, hideId) {
      document.getElementById(hideId).classList.remove('active');
      document.getElementById(showId).classList.add('active');
    }
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        email: document.getElementById('registerEmail').value,
        password: document.getElementById('registerPassword').value,
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        companyName: document.getElementById('companyName').value,
        profileType: 'freelancer'
      };
      
      try {
        const response = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          showDashboard(result.user);
        } else {
          document.getElementById('registerError').textContent = result.error || 'Error';
          document.getElementById('registerError').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('registerError').textContent = 'Error: ' + error.message;
        document.getElementById('registerError').style.display = 'block';
      }
    });
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      };
      
      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          showDashboard(result.user);
        } else {
          document.getElementById('loginError').textContent = result.error || 'Error';
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('loginError').textContent = 'Error: ' + error.message;
        document.getElementById('loginError').style.display = 'block';
      }
    });
    
    function showDashboard(user) {
      document.getElementById('loginCard').classList.remove('active');
      document.getElementById('registerCard').classList.remove('active');
      document.getElementById('dashboard').classList.add('active');
      
      document.getElementById('userName').textContent = user.firstName || user.email;
      document.getElementById('userEmail').textContent = user.email;
    }
    
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      
      document.getElementById('loginCard').classList.add('active');
      document.getElementById('dashboard').classList.remove('active');
      
      document.getElementById('loginForm').reset();
    }
    
    window.addEventListener('load', () => {
      const user = localStorage.getItem('user');
      if (user) {
        showDashboard(JSON.parse(user));
      }
    });
  </script>
</body>
</html>
